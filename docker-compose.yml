services:
  market-data-service:
    build:
      context: .
    container_name: market-data-service
    restart: unless-stopped
    environment:
      MDS_DATABASE_PATH: /data/market.sqlite3
      MDS_MARKETS_CONFIG_PATH: /app/config/markets.toml
      MDS_HTTP_HOST: 0.0.0.0
      MDS_HTTP_PORT: 8080
      MDS_STARTUP_BACKFILL_WINDOWS_PER_STREAM: 2
      MDS_STARTUP_REPAIR_WINDOWS_PER_STREAM: 2
    ports:
      - "8080:8080"
    volumes:
      - market-data-service-data:/data

volumes:
  market-data-service-data:
